<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; }
  .scale { display: flex; align-items: flex-end; gap: 14px; }
  .step { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .bar { background: var(--putter-500); height: 20px; border-radius: 1px; }
  .l { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
  .l b { color: var(--fg-1); font-weight: 400; }
</style></head>
<body>
  <div class="cap">Spacing scale — 4, 8, 12, 16, 24, 32, 48, 64, 96, 128 (px)</div>
  <div class="scale">
    <div class="step"><div class="bar" style="width:4px"></div><span class="l"><b>s-1</b> 4</span></div>
    <div class="step"><div class="bar" style="width:8px"></div><span class="l"><b>s-2</b> 8</span></div>
    <div class="step"><div class="bar" style="width:12px"></div><span class="l"><b>s-3</b> 12</span></div>
    <div class="step"><div class="bar" style="width:16px"></div><span class="l"><b>s-4</b> 16</span></div>
    <div class="step"><div class="bar" style="width:24px"></div><span class="l"><b>s-5</b> 24</span></div>
    <div class="step"><div class="bar" style="width:32px"></div><span class="l"><b>s-6</b> 32</span></div>
    <div class="step"><div class="bar" style="width:48px"></div><span class="l"><b>s-7</b> 48</span></div>
    <div class="step"><div class="bar" style="width:64px"></div><span class="l"><b>s-8</b> 64</span></div>
    <div class="step"><div class="bar" style="width:96px"></div><span class="l"><b>s-9</b> 96</span></div>
    <div class="step"><div class="bar" style="width:128px"></div><span class="l"><b>s-10</b> 128</span></div>
  </div>
</body></html>
