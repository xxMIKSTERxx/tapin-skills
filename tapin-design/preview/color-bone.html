<!doctype html><html><head><meta charset="utf-8"><title>Bone — parchment ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 76px; border-radius: var(--radius-2); border: 1px solid var(--line-soft); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
</style></head>
<body>
  <div class="cap">Bone — parchment ramp (warm)</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#F4F1EA"></div><span class="n">bone-50</span><span class="v">#F4F1EA</span></div>
    <div class="sw"><div class="chip" style="background:#ECE7DC"></div><span class="n">bone-100</span><span class="v">#ECE7DC</span></div>
    <div class="sw"><div class="chip" style="background:#D9D2C2"></div><span class="n">bone-200</span><span class="v">#D9D2C2</span></div>
    <div class="sw"><div class="chip" style="background:#B7AE9B"></div><span class="n">bone-300</span><span class="v">#B7AE9B</span></div>
    <div class="sw"><div class="chip" style="background:#8A8273"></div><span class="n">bone-400</span><span class="v">#8A8273</span></div>
    <div class="sw"><div class="chip" style="background:#5C564B"></div><span class="n">bone-500</span><span class="v">#5C564B</span></div>
  </div>
</body></html>
