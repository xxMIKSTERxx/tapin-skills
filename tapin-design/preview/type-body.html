<!doctype html><html><head><meta charset="utf-8"><title>UI / Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; }
  .row { display: grid; grid-template-columns: 80px 1fr; gap: 12px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--line-soft); }
  .row:last-child { border-bottom: none; }
  .row .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.05em; text-transform: uppercase; }
  .w400 { font-weight: 400; }
  .w500 { font-weight: 500; }
  .w600 { font-weight: 600; }
  .w700 { font-weight: 700; }
  .w800 { font-weight: 800; }
  .sample { color: var(--fg-1); font-size: 18px; letter-spacing: -0.01em; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
</style></head>
<body>
  <div class="name">Inter</div>
  <div class="row"><span class="lbl">400</span><span class="sample w400">The engine resolves a mass distribution.</span></div>
  <div class="row"><span class="lbl">500</span><span class="sample w500">The engine resolves a mass distribution.</span></div>
  <div class="row"><span class="lbl">600</span><span class="sample w600">The engine resolves a mass distribution.</span></div>
  <div class="row"><span class="lbl">700</span><span class="sample w700">The engine resolves a mass distribution.</span></div>
  <div class="row"><span class="lbl">800</span><span class="sample w800">The engine resolves a mass distribution.</span></div>
</body></html>
