<!doctype html><html><head><meta charset="utf-8"><title>Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; }
  .specimen { font-family: var(--font-display); font-weight: 700; font-size: 96px; line-height: 0.95; letter-spacing: -0.04em; color: var(--fg-1); }
  .specimen .accent { color: var(--putter-500); }
  .meta { display: flex; gap: 24px; margin-top: 16px; }
  .meta div { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .meta b { color: var(--fg-2); font-weight: 500; }
</style></head>
<body>
  <div class="specimen">A putter, <span class="accent">computed.</span></div>
  <div class="meta">
    <div><b>Inter</b> · Bold 700</div>
    <div>letter-spacing −0.04em</div>
    <div>--tracking-display</div>
  </div>
</body></html>
