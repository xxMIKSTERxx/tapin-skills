<!doctype html><html><head><meta charset="utf-8"><title>Mono / Data</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 32px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-bottom: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  .tbl { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1, "zero" 1; font-size: 14px; color: var(--fg-1); border-collapse: collapse; width: 100%; }
  .tbl td { padding: 7px 12px 7px 0; border-bottom: 1px solid var(--line-soft); }
  .tbl td:first-child { color: var(--fg-3); width: 40%; }
  .tbl td:last-child { text-align: right; }
  .unit { color: var(--fg-3); margin-left: 3px; font-weight: 300; }
</style></head>
<body>
  <div class="name">IBM Plex Mono · tabular-nums · zero</div>
  <table class="tbl">
    <tr><td>head_mass</td><td>354.218<span class="unit">g</span></td></tr>
    <tr><td>moi_y</td><td>5,820<span class="unit">g·cm²</span></td></tr>
    <tr><td>face_roughness</td><td>Rₐ 1.20<span class="unit">µm</span></td></tr>
    <tr><td>modal_1f</td><td>4,103<span class="unit">Hz</span></td></tr>
    <tr><td>tolerance</td><td>± 0.05<span class="unit">mm</span></td></tr>
    <tr><td>alloy</td><td>Ti-6Al-4V</td></tr>
  </table>
</body></html>
