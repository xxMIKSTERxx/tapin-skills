<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  .grp h3 { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 10px; font-weight: 500; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .sw { display: grid; grid-template-columns: 24px 110px 1fr; align-items: center; gap: 10px; }
  .chip { height: 24px; width: 24px; border-radius: var(--radius-1); border: 1px solid var(--line-soft); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head>
<body>
  <div class="row">
    <div class="grp">
      <h3>Surfaces</h3>
      <div class="stack">
        <div class="sw"><div class="chip" style="background:var(--bg)"></div><span class="n">--bg</span><span class="v">turf-950</span></div>
        <div class="sw"><div class="chip" style="background:var(--surface-1)"></div><span class="n">--surface-1</span><span class="v">turf-900</span></div>
        <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><span class="n">--surface-2</span><span class="v">turf-850</span></div>
        <div class="sw"><div class="chip" style="background:var(--surface-3)"></div><span class="n">--surface-3</span><span class="v">turf-800</span></div>
        <div class="sw"><div class="chip" style="background:var(--surface-inv)"></div><span class="n">--surface-inv</span><span class="v">bone-50</span></div>
      </div>
    </div>
    <div class="grp">
      <h3>Foreground &amp; line</h3>
      <div class="stack">
        <div class="sw"><div class="chip" style="background:var(--fg-1)"></div><span class="n">--fg-1</span><span class="v">primary text</span></div>
        <div class="sw"><div class="chip" style="background:var(--fg-2)"></div><span class="n">--fg-2</span><span class="v">secondary</span></div>
        <div class="sw"><div class="chip" style="background:var(--fg-3)"></div><span class="n">--fg-3</span><span class="v">tertiary · label</span></div>
        <div class="sw"><div class="chip" style="background:var(--fg-4)"></div><span class="n">--fg-4</span><span class="v">placeholder · tick</span></div>
        <div class="sw"><div class="chip" style="border-color:var(--line-strong);background:transparent"></div><span class="n">--line-strong</span><span class="v">rgba(255,255,255,.20)</span></div>
      </div>
    </div>
  </div>
</body></html>
