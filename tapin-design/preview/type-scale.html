<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .row { display: grid; grid-template-columns: 110px 1fr 70px; gap: 14px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--line-soft); }
  .row:last-child { border-bottom: none; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.05em; }
  .size { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; }
  .s-d1 { font-family: var(--font-display); font-weight: 700; font-size: 52px; line-height: 1; letter-spacing: -0.04em; }
  .s-h1 { font-family: var(--font-display); font-weight: 700; font-size: 36px; line-height: 1.0; letter-spacing: -0.035em; }
  .s-h2 { font-family: var(--font-display); font-weight: 700; font-size: 28px; line-height: 1.05; letter-spacing: -0.03em; }
  .s-h3 { font-family: var(--font-display); font-weight: 600; font-size: 22px; letter-spacing: -0.02em; }
  .s-h4 { font-family: var(--font-sans); font-size: 18px; font-weight: 600; letter-spacing: -0.015em; }
  .s-b  { font-family: var(--font-sans); font-size: 16px; color: var(--fg-2); letter-spacing: -0.01em; }
  .s-bs { font-family: var(--font-sans); font-size: 14px; color: var(--fg-2); letter-spacing: -0.005em; }
  .s-l  { font-family: var(--font-sans); font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); }
</style></head>
<body>
  <div class="row"><span class="tok">display-1</span><span class="s-d1">Computed</span><span class="size">88 / 88</span></div>
  <div class="row"><span class="tok">h1</span><span class="s-h1">Geometry validated</span><span class="size">48 / 48</span></div>
  <div class="row"><span class="tok">h2</span><span class="s-h2">Mass distribution</span><span class="size">36 / 38</span></div>
  <div class="row"><span class="tok">h3</span><span class="s-h3">Stroke profile</span><span class="size">26 / 29</span></div>
  <div class="row"><span class="tok">h4</span><span class="s-h4">Constraints</span><span class="size">20 / 22</span></div>
  <div class="row"><span class="tok">body</span><span class="s-b">The kernel proposes a head family within ~40 s.</span><span class="size">16 / 23</span></div>
  <div class="row"><span class="tok">body-sm</span><span class="s-bs">Slice into print-ready STL when validated.</span><span class="size">14 / 20</span></div>
  <div class="row"><span class="tok">label</span><span class="s-l">Section · 02</span><span class="size">12 / 16</span></div>
</body></html>
