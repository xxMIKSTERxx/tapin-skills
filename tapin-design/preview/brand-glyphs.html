<!doctype html><html><head><meta charset="utf-8"><title>Engineering glyphs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 18px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 8px; background: var(--surface-2); border: 1px solid var(--line-soft); border-radius: var(--radius-2); color: var(--putter-500); }
  .item img { width: 36px; height: 36px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style></head>
<body>
  <div class="cap">Custom engineering glyphs · stroke 1.5 · currentColor</div>
  <div class="row">
    <div class="item"><img src="../assets/glyphs/mass-center.svg"><span class="n">mass-center</span></div>
    <div class="item"><img src="../assets/glyphs/moment-arrow.svg"><span class="n">moment-arrow</span></div>
    <div class="item"><img src="../assets/glyphs/isoline.svg"><span class="n">isoline</span></div>
    <div class="item"><img src="../assets/glyphs/modal-shape.svg"><span class="n">modal-shape</span></div>
    <div class="item"><img src="../assets/glyphs/lattice-cell.svg"><span class="n">lattice-cell</span></div>
  </div>
</body></html>
