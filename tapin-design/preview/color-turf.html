<!doctype html><html><head><meta charset="utf-8"><title>Turf — dark surface ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 28px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 76px; border-radius: var(--radius-2); border: 1px solid var(--line-soft); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 14px; }
</style></head>
<body>
  <div class="cap">Turf — dark surface ramp (cool)</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0B0F0D"></div><span class="n">turf-950</span><span class="v">#0B0F0D</span></div>
    <div class="sw"><div class="chip" style="background:#121814"></div><span class="n">turf-900</span><span class="v">#121814</span></div>
    <div class="sw"><div class="chip" style="background:#171E1A"></div><span class="n">turf-850</span><span class="v">#171E1A</span></div>
    <div class="sw"><div class="chip" style="background:#1D2521"></div><span class="n">turf-800</span><span class="v">#1D2521</span></div>
    <div class="sw"><div class="chip" style="background:#2A332E"></div><span class="n">turf-700</span><span class="v">#2A332E</span></div>
    <div class="sw"><div class="chip" style="background:#3B453F"></div><span class="n">turf-600</span><span class="v">#3B453F</span></div>
  </div>
</body></html>
